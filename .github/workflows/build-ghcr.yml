name: Build and publish Windows container

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - Dockerfile
      - Start.ps1
      - .dockerignore
      - .github/workflows/build-ghcr.yml

permissions:
  contents: read
  packages: write

concurrency:
  group: tf2-image-${{ github.ref }}
  cancel-in-progress: true

env:
  IMAGE_NAME: ghcr.io/twistedbobross/gsa-compatible-teamfortress2
  IMAGE_TAG: 232250-ltsc2022-r4
  GHCR_USERNAME: twistedbobross

jobs:
  build:
    runs-on: windows-2022

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Start Docker runtime
        shell: powershell
        run: |
          $ErrorActionPreference = "Stop"

          $dockerService = Get-Service -Name docker -ErrorAction SilentlyContinue
          if (-not $dockerService) {
            throw "The Docker service is not installed on this runner."
          }

          if ($dockerService.Status -ne "Running") {
            Start-Service -Name docker
          }

          $deadline = (Get-Date).AddMinutes(2)
          do {
            try {
              docker info
              break
            }
            catch {
              if ((Get-Date) -ge $deadline) {
                throw
              }
              Start-Sleep -Seconds 5
            }
          } while ($true)

          docker version
          docker info

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ github.token }}

      - name: Build Windows image
        shell: powershell
        run: |
          $versionTag = "${env:IMAGE_NAME}:${env:IMAGE_TAG}"
          $latestTag = "${env:IMAGE_NAME}:latest"
          docker build --pull `
            -t $versionTag `
            -t $latestTag `
            .

      - name: Push image
        shell: powershell
        run: |
          $versionTag = "${env:IMAGE_NAME}:${env:IMAGE_TAG}"
          $latestTag = "${env:IMAGE_NAME}:latest"
          docker push $versionTag
          docker push $latestTag
